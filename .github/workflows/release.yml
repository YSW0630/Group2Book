name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: manifest
        run: |
          VERSION=$(jq -r '.version' src/manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="${{ steps.manifest.outputs.version }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag version v$TAG does not match manifest version $VERSION"
            exit 1
          fi

      - name: Build ZIP
        run: |
          mkdir -p dist
          cd src
          zip -r ../dist/export-group-to-bookmarks-v${{ steps.manifest.outputs.version }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/export-group-to-bookmarks-v${{ steps.manifest.outputs.version }}.zip